<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WITHER KIBR Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            background-image: 
                url('https://images.unsplash.com/photo-1614730321146-b6fa6a46bcb4?w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            z-index: -2;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: -1;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding-top: 30px;
        }

        h1 {
            font-size: 3.2em;
            text-shadow: 3px 3px 8px rgba(0, 0, 0, 0.5);
            margin-bottom: 15px;
            letter-spacing: 3px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 1.1em;
            opacity: 0.9;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 35px;
            background: rgba(255, 255, 255, 0.12);
            border: 2px solid rgba(255, 255, 255, 0.35);
            color: white;
            border-radius: 30px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .btn:hover {
            background: rgba(255, 255, 255, 0.22);
            border-color: rgba(255, 255, 255, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .sections {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 25px;
            padding: 35px;
            color: white;
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.37);
            transition: all 0.3s ease;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.16);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-8px);
            box-shadow: 0 12px 40px rgba(31, 38, 135, 0.5);
        }

        h2 {
            font-size: 1.9em;
            margin-bottom: 25px;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.3);
            font-weight: 600;
        }

        .currency-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 15px;
        }

        .currency-item {
            background: rgba(255, 255, 255, 0.08);
            padding: 18px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .currency-item:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            transform: scale(1.05);
        }

        .currency-label {
            font-size: 0.9em;
            opacity: 0.85;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .currency-value {
            font-size: 1.6em;
            font-weight: 700;
            color: #ffd700;
        }

        .current-weather {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .weather-icon {
            font-size: 4em;
            margin: 15px 0;
        }

        .temperature {
            font-size: 2.2em;
            font-weight: 700;
            margin: 10px 0;
        }

        .location-name {
            opacity: 0.85;
            font-size: 1em;
            margin-top: 10px;
        }

        .wind-info {
            opacity: 0.8;
            font-size: 1em;
            margin-top: 8px;
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }

        .city-card {
            background: rgba(255, 255, 255, 0.09);
            padding: 18px;
            border-radius: 18px;
            text-align: center;
            border: 2px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .city-card:hover {
            background: rgba(255, 255, 255, 0.14);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-4px);
        }

        .city-card.active {
            background: rgba(102, 126, 234, 0.35);
            border-color: rgba(255, 255, 255, 0.6);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .city-name {
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 1em;
        }

        .city-weather-icon {
            font-size: 2.5em;
            margin: 8px 0;
        }

        .city-temperature {
            font-size: 1.3em;
            font-weight: 700;
            margin: 5px 0;
        }

        .city-wind {
            font-size: 0.85em;
            opacity: 0.75;
        }

        .chart-container {
            position: relative;
            height: 350px;
            margin-top: 20px;
            background: rgba(255, 255, 255, 0.05);
            padding: 25px;
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .loading {
            text-align: center;
            padding: 25px;
            opacity: 0.75;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.75; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.98); }
        }

        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.15);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 107, 107, 0.4);
            margin: 10px 0;
        }

        @media (max-width: 1024px) {
            .sections {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2.5em;
            }
        }

        @media (max-width: 768px) {
            .container {
                padding: 15px;
            }

            h1 {
                font-size: 2em;
            }

            h2 {
                font-size: 1.5em;
            }

            .card {
                padding: 20px;
            }

            .cities-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 12px;
            }

            .city-name {
                font-size: 0.9em;
            }

            .city-weather-icon {
                font-size: 2em;
            }

            .chart-container {
                height: 250px;
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 1.6em;
                letter-spacing: 1px;
            }

            .subtitle {
                font-size: 0.9em;
            }

            .card {
                padding: 15px;
                border-radius: 15px;
            }

            h2 {
                font-size: 1.3em;
                margin-bottom: 15px;
            }

            .cities-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .currency-item {
                padding: 12px;
                border-radius: 12px;
            }

            .currency-value {
                font-size: 1.3em;
            }
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="overlay"></div>

    <div class="container">
        <header>
            <h1>WITHER KIBR</h1>
            <p class="subtitle">Valyuta kurslari va ob-havo ma'lumotlari</p>
        </header>

        <div class="controls">
            <button class="btn" onclick="refreshData()">🔄 Yangilash</button>
            <button class="btn" onclick="useCurrentLocation()">📍 Mening Joym</button>
        </div>

        <div class="sections">
            <!-- Valyuta bo'limi -->
            <div class="card">
                <h2>💱 Valyuta Kurslari</h2>
                <div id="currencyContent" class="loading">⏳ Yuklanmoqda...</div>
            </div>

            <!-- Ob-havo bo'limi -->
            <div class="card">
                <h2>🌤️ Hozirgi Ob-havo</h2>
                <div id="weatherContent" class="loading">⏳ Yuklanmoqda...</div>
            </div>
        </div>

        <!-- Grafik bo'limi -->
        <div class="card">
            <h2>📈 24 Soat Harorat Grafigi</h2>
            <div id="chartContent" class="chart-container">
                <div class="loading">⏳ Yuklanmoqda...</div>
            </div>
        </div>

        <!-- Shaharlar -->
        <div class="card">
            <h2>🏙️ O'zbekiston Shaharlari</h2>
            <div class="cities-grid" id="citiesGrid"></div>
        </div>
    </div>

    <script>
        const cities = [
            { name: "Tashkent", lat: 41.2995, lon: 69.2401 },
            { name: "Samarkand", lat: 39.6545, lon: 66.9597 },
            { name: "Bukhara", lat: 39.7747, lon: 64.4161 },
            { name: "Andijan", lat: 40.7345, lon: 72.6442 },
            { name: "Namangan", lat: 40.9962, lon: 71.6706 },
            { name: "Fergana", lat: 40.3868, lon: 71.7590 },
            { name: "Navoi", lat: 40.0967, lon: 65.3794 },
            { name: "Karshi", lat: 38.8294, lon: 65.7808 },
            { name: "Termiz", lat: 37.2808, lon: 68.7738 },
            { name: "Urgench", lat: 41.5510, lon: 60.6271 },
            { name: "Nukus", lat: 42.4648, lon: 59.6062 },
            { name: "Jizzakh", lat: 40.1089, lon: 67.8540 }
        ];

        let currentLocation = { lat: 41.2995, lon: 69.2401, name: "Tashkent" };
        let weatherChart = null;

        const weatherIcons = {
            0: '☀️', 1: '🌤️', 2: '⛅', 3: '☁️', 45: '🌫️', 48: '🌫️',
            51: '🌧️', 53: '🌧️', 55: '🌧️', 61: '🌧️', 63: '🌧️', 65: '⛈️',
            71: '❄️', 73: '❄️', 75: '❄️', 77: '❄️', 80: '🌧️', 81: '⛈️',
            82: '⛈️', 85: '❄️', 86: '❄️', 95: '⛈️', 96: '⛈️', 99: '⛈️'
        };

        function getWeatherIcon(code) {
            return weatherIcons[code] || '🌤️';
        }

        async function fetchCurrencyRates() {
            const elem = document.getElementById('currencyContent');
            try {
                elem.innerHTML = '<div class="loading">⏳ Yuklanmoqda...</div>';
                
                const rates = {};
                const currencies = ['USD', 'EUR', 'RUB'];
                
                for (const curr of currencies) {
                    try {
                        const response = await fetch(`https://open.er-api.com/v6/latest/${curr}`);
const data = await response.json();

// data.result "success" bo‘lsa ishlaydi
if (data.result !== "success") throw new Error("API javobi xato");

// UZS kursi
rates[curr] = Number(data.rates.UZS).toFixed(2);
                    } catch (e) {
                        console.error(`${curr} kursini yuklay olmadi:`, e);
                        rates[curr] = 'Xato';
                    }
                }

                elem.innerHTML = `
                    <div class="currency-grid">
                        <div class="currency-item">
                            <div class="currency-label">USD → UZS</div>
                            <div class="currency-value">${rates.USD}</div>
                        </div>
                        <div class="currency-item">
                            <div class="currency-label">EUR → UZS</div>
                            <div class="currency-value">${rates.EUR}</div>
                        </div>
                        <div class="currency-item">
                            <div class="currency-label">RUB → UZS</div>
                            <div class="currency-value">${rates.RUB}</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                console.error('Valyuta xatosi:', error);
                elem.innerHTML = '<div class="error">❌ Valyuta ma\'lumotini yuklay olmadi. Keyinroq qayta urinib ko\'ring.</div>';
            }
        }

        async function fetchWeather(lat, lon) {
            try {
                const response = await fetch(
                    `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=temperature_2m&timezone=auto`
                );
                if (!response.ok) throw new Error('API javobi xato');
                const data = await response.json();
                return {
                    current: data.current_weather,
                    hourly: data.hourly,
                    timezone: data.timezone
                };
            } catch (error) {
                console.error('Ob-havo xatosi:', error);
                return null;
            }
        }

        async function updateCurrentLocation() {
            const elem = document.getElementById('weatherContent');
            try {
                elem.innerHTML = '<div class="loading">⏳ Yuklanmoqda...</div>';
                
                const weather = await fetchWeather(currentLocation.lat, currentLocation.lon);
                if (!weather) throw new Error('Ob-havo ma\'lumoti yuklay olmadi');

                const wind = weather.current_weather?.windspeed;
const temp = weather.current_weather?.temperature;
                
                const tempText = (typeof temp === "number") ? temp.toFixed(1) : "—";
const windText = (typeof wind === "number") ? wind.toFixed(1) : "—";

elem.innerHTML = `
    <div class="current-weather">
        <div class="weather-icon">
            ${getWeatherIcon(weather.current_weather?.weathercode)}
        </div>
        <div class="temperature">${tempText}°C</div>
        <div class="wind-info">💨 Shamol: ${windText} km/soat</div>
        <div class="location-name">📍 ${currentLocation.name}</div>
    </div>
`;

                // Grafik yangilash
                updateChart(weather.hourly.time, weather.hourly.temperature_2m);
            } catch (error) {
                console.error('Ob-havo yangilash xatosi:', error);
                elem.innerHTML = '<div class="error">❌ Ob-havo ma\'lumoti yuklay olmadi</div>';
            }
        }

        function updateChart(times, temperatures) {
            const canvasContainer = document.getElementById('chartContent');
            
            if (weatherChart) {
                weatherChart.destroy();
            }

            canvasContainer.innerHTML = '<canvas id="chartCanvas" style="max-height: 300px;"></canvas>';
            const ctx = document.getElementById('chartCanvas').getContext('2d');

            const next24Hours = times.slice(0, 24);
            const next24Temps = temperatures.slice(0, 24);

            weatherChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: next24Hours.map(t => {
                        const time = new Date(t);
                        return time.getHours().toString().padStart(2, '0') + ':00';
                    }),
                    datasets: [{
                        label: 'Harorat (°C)',
                        data: next24Temps,
                        borderColor: 'rgba(255, 215, 0, 0.9)',
                        backgroundColor: 'rgba(102, 126, 234, 0.15)',
                        tension: 0.4,
                        fill: true,
                        pointRadius: 4,
                        pointBackgroundColor: 'rgba(255, 215, 0, 1)',
                        pointBorderColor: 'rgba(255, 255, 255, 0.8)',
                        pointBorderWidth: 2,
                        borderWidth: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            labels: { 
                                color: 'rgba(255, 255, 255, 0.9)',
                                font: { size: 13, weight: 'bold' }
                            }
                        }
                    },
                    scales: {
                        y: {
                            ticks: { 
                                color: 'rgba(255, 255, 255, 0.8)',
                                font: { size: 12 }
                            },
                            grid: { 
                                color: 'rgba(255, 255, 255, 0.1)',
                                drawBorder: false
                            }
                        },
                        x: {
                            ticks: { 
                                color: 'rgba(255, 255, 255, 0.8)',
                                font: { size: 12 }
                            },
                            grid: { 
                                color: 'rgba(255, 255, 255, 0.1)',
                                drawBorder: false
                            }
                        }
                    }
                }
            });
        }

        async function loadCities() {
            const grid = document.getElementById('citiesGrid');
            grid.innerHTML = '';

            for (const city of cities) {
                const card = document.createElement('div');
                card.className = city.name === currentLocation.name ? 'city-card active' : 'city-card';
                card.innerHTML = '<div class="loading">⏳</div>';
                
                grid.appendChild(card);

                try {
                    const weather = await fetchWeather(city.lat, city.lon);
                    
                    if (weather) {
                        const temp = weather.current.temperature;
                        const wind = weather.current.wind_speed;
                        const icon = getWeatherIcon(weather.current.weather_code);
                        
                        card.innerHTML = `
                            <div class="city-name">${city.name}</div>
                            <div class="city-weather-icon">${icon}</div>
                            <div class="city-temperature">${temp.toFixed(0)}°C</div>
                            <div class="city-wind">💨 ${wind.toFixed(1)} km</div>
                        `;
                        
                        card.onclick = async () => {
                            currentLocation = { lat: city.lat, lon: city.lon, name: city.name };
                            document.querySelectorAll('.city-card').forEach(c => c.classList.remove('active'));
                            card.classList.add('active');
                            await updateCurrentLocation();
                        };
                    } else {
                        card.innerHTML = `<div class="city-name">${city.name}</div><div class="error">❌ Xato</div>`;
                    }
                } catch (error) {
                    card.innerHTML = `<div class="city-name">${city.name}</div><div class="error">❌ Xato</div>`;
                }
            }
        }

        function useCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const { latitude, longitude } = position.coords;
                    
                    // Yaqin shaharni topish
                    let nearestCity = cities[0];
                    let minDist = Infinity;
                    
                    for (const city of cities) {
                        const dist = Math.sqrt(Math.pow(city.lat - latitude, 2) + Math.pow(city.lon - longitude, 2));
                        if (dist < minDist) {
                            minDist = dist;
                            nearestCity = city;
                        }
                    }
                    
                    currentLocation = { lat: latitude, lon: longitude, name: nearestCity.name + " (Sizning joying)" };
                    await updateCurrentLocation();
                    await loadCities();
                }, (error) => {
                    console.log('Geolocation xatosi:', error);
                    alert('Lokatsiya ruxsati talab qilinadi. Tashkent default sifatida ishlatilmoqda.');
                });
            } else {
                alert('Brauzer geolocation qo\'llab quvvatlamaydi');
            }
        }

        async function refreshData() {
            await fetchCurrencyRates();
            await updateCurrentLocation();
            await loadCities();
        }

        // Boshlang'ich yuklash
        window.addEventListener('load', refreshData);
    </script>
</body>
</html>
